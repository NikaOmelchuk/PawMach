{% extends "admin/base_site.html" %}
{% load static %}

{% block branding %}
<h1 id="site-name">
    <a href="{% url 'admin:index' %}">
        🐱 {{ site_header|default:_('Django administration') }}
    </a>
</h1>
{% endblock %}

{% block nav-global %}
<div class="header-links" style="display: flex; align-items: center; gap: 20px; margin-left: 30px;">
    <a href="/api/swagger/"
        style="color: white; font-weight: bold; text-decoration: none; background: rgba(255,255,255,0.1); padding: 5px 15px; border-radius: 4px; transition: background 0.2s;"
        onmouseover="this.style.background='rgba(255,255,255,0.2)'"
        onmouseout="this.style.background='rgba(255,255,255,0.1)'">
        📡 Серверна частина (Swagger)
    </a>
    <a href="/"
        style="color: white; font-weight: bold; text-decoration: none; background: rgba(255,255,255,0.1); padding: 5px 15px; border-radius: 4px; transition: background 0.2s;"
        onmouseover="this.style.background='rgba(255,255,255,0.2)'"
        onmouseout="this.style.background='rgba(255,255,255,0.1)'">
        🏠 На головну
    </a>
</div>
{% endblock %}
