{% load static %}
<!DOCTYPE html>
<html lang="uk">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Сесія — PawMatch</title>
    <link rel="stylesheet" href="{% static 'css/style.css' %}?v=2">
</head>

<body>

    <nav class="navbar">
        <a href="/dashboard/" class="navbar-brand"><span class="brand-icon">🐱</span> PawMatch</a>
        <div style="font-size:0.95rem;font-weight:700;color:var(--text-mid);" id="session-title">Сесія</div>
        <div class="navbar-user">
            <button class="btn btn-outline btn-sm btn-share" style="padding:0.3rem 0.6rem; border:none;"
                title="Поділитись сесією">🔗</button>
            <button class="btn btn-outline btn-sm btn-theme-toggle" style="padding:0.3rem 0.6rem; border:none;"
                title="Змінити тему">🌙</button>
            <a href="/profile/"
                style="text-decoration: none; display: flex; align-items: center; gap: 10px; color: inherit; margin-left: 10px;">
                <span style="font-size:0.875rem;color:var(--text-mid);font-weight:600;" id="nav-username"></span>
                <div class="user-avatar" id="user-avatar-letter" title="Мій профіль">U</div>
            </a>
            <button class="btn btn-outline btn-sm" id="btn-logout" style="margin-left: 15px;">Вийти</button>
        </div>
    </nav>

    <div class="page-wrapper" style="display:grid;grid-template-columns:1fr 280px;gap:2rem;align-items:start;">

        <div>

            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:0.5rem;">
                <span style="font-size:0.8rem;font-weight:700;color:var(--lavender-mid);">Прогрес</span>
                <span style="font-size:0.8rem;font-weight:700;color:var(--text-muted);" id="progress-text">0 / 0</span>
            </div>
            <div class="progress-bar-wrap">
                <div class="progress-bar-fill" id="progress-bar" style="width:0%"></div>
            </div>

            <div class="card" id="quiz-area" style="margin-top:1rem;">
                <div class="question-number" id="question-number">Питання 1</div>
                <div class="question-text" id="question-text">Завантаження...</div>
                <div id="question-body"></div>

                <div style="display:flex;gap:0.75rem;margin-top:1.5rem;justify-content:space-between;" id="quiz-nav">
                    <button class="btn btn-outline" id="btn-prev" disabled>← Назад</button>
                    <div style="display:flex;gap:0.75rem;">
                        <button class="btn btn-primary" id="btn-next">Далі →</button>
                        <button class="btn btn-primary hidden" id="btn-submit">✅ Надіслати відповіді</button>
                    </div>
                </div>

                <div class="hidden" id="submit-done"
                    style="margin-top:1rem;padding:1rem;background:var(--lavender-soft);border-radius:var(--radius-md);text-align:center;color:var(--lavender-deep);font-weight:700;">
                    🎉 Відповіді надіслано! Чекай поки всі учасники завершать.
                </div>
            </div>

            <div class="hidden mt-3" id="complete-section">
                <div class="card"
                    style="background:linear-gradient(135deg,rgba(124,58,237,0.08),rgba(167,139,250,0.12));text-align:center;">
                    <div style="font-size:1.8rem;margin-bottom:0.5rem;">🏁</div>
                    <div class="card-title mb-1">Всі відповіли?</div>
                    <div class="card-body mb-2" style="font-size:0.875rem;">Завершіть сесію щоб побачити результати
                        сумісності</div>
                    <button class="btn btn-primary btn-full" id="btn-complete">🏁 Завершити та побачити
                        результати</button>
                </div>
            </div>
        </div>

        <div style="position:sticky;top:80px;display:flex;flex-direction:column;gap:1rem;">

            <div class="card" style="text-align:center;">
                <div style="font-size:0.8rem;font-weight:700;color:var(--text-muted);margin-bottom:0.4rem;">КОД СЕСІЇ
                </div>
                <div class="session-code-display" id="session-code-display" title="Клікни щоб скопіювати">—</div>
                <div style="font-size:0.75rem;color:var(--text-muted);">Поділись з учасниками</div>
            </div>

            <div class="card">
                <div class="card-title mb-2">👥 Учасники</div>
                <div id="participants-list">
                    <div class="loader" style="padding:1rem 0;">
                        <div class="spinner" style="width:24px;height:24px;border-width:3px;"></div>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <script>window.SESSION_ID = "{{ session_id }}";</script>
    <script src="{% static 'js/api.js' %}?v=2"></script>
    <script src="{% static 'js/session.js' %}?v=2"></script>
</body>

</html>
